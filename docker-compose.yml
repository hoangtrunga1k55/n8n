version: "3.1"

services:
  n8n:
    build: .
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=adminpassword
      - N8N_HOST=thq-solution.australiaeast.cloudapp.azure.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://thq-solution.australiaeast.cloudapp.azure.com
      - NODES_EXCLUDE="[]"
      - N8N_FILE_ACCESS_WHITELIST=/shared,/tmp
      - N8N_RESTRICT_FILE_ACCESS_TO=/shared;/tmp;/home/node/.n8n-files
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - laravel_appnet
networks:
  laravel_appnet:
    external: true

