services:
  n8n:
    build: .
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_ENCRYPTION_KEY=thq-super-secret-key-2026
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=adminpassword
      - N8N_HOST=n8n.thq-solution.io.vn
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.thq-solution.io.vn/
      - N8N_EDITOR_BASE_URL=https://n8n.thq-solution.io.vn
      - NODES_EXCLUDE="[]"
      - N8N_FILE_ACCESS_WHITELIST=/shared,/tmp
      - N8N_RESTRICT_FILE_ACCESS_TO=/shared;/tmp;/home/node/.n8n-files
      - N8N_PROXY_HOPS=1
    volumes:
      - ./n8n_data:/home/node/.n8n
    expose:
      - "5678"
    networks:
      - shared_proxy
networks:
  shared_proxy:
    external: true
